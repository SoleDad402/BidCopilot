<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BidCopilot Command Center{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Design System -->
    <link rel="stylesheet" href="/static/css/tokens.css">
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/components.css">
    <link rel="stylesheet" href="/static/css/animations.css">
    <style id="page-styles">{% block head_extra_inner %}{% endblock %}</style>
    {% block head_extra %}{% endblock %}
</head>
<body>

<!-- HEADER (persists across navigation) -->
<header class="header">
    <div class="header-left">
        <a href="/" class="header-brand" data-nav>
            <div class="logo-mark">BC</div>
            <span class="header-title">BidCopilot Command Center</span>
        </a>
        <nav class="header-nav" id="mainNav">
            <a href="/" data-nav {% if active_page == 'dashboard' %}class="active"{% endif %}>Dashboard</a>
            <a href="/profile" data-nav {% if active_page == 'profile' %}class="active"{% endif %}>Profile</a>
            <a href="/discovery-settings" data-nav {% if active_page == 'discovery' %}class="active"{% endif %}>Discovery</a>
            <a href="/monitor" data-nav {% if active_page == 'monitor' %}class="active"{% endif %}>Monitor</a>
            <a href="/admin" data-nav {% if active_page == 'admin' %}class="active"{% endif %}>Admin</a>
        </nav>
    </div>
    <div class="header-right">
        <div class="status-indicator">
            <span class="status-dot"></span>
            <span id="lastUpdate">{% block status_text %}System Online{% endblock %}</span>
        </div>
        {% if user %}
        <div class="user-menu" style="display:flex;align-items:center;gap:10px;margin-left:16px;padding-left:16px;border-left:1px solid var(--border-subtle);">
            <span style="font-size:0.8125rem;color:var(--text-secondary);">{{ user.full_name or user.email }}</span>
            <button onclick="window.bcLogout()" style="padding:5px 12px;font-size:0.75rem;font-weight:600;background:transparent;border:1px solid var(--border-subtle);border-radius:var(--radius-sm);color:var(--text-muted);cursor:pointer;font-family:inherit;transition:color 0.2s,border-color 0.2s;" onmouseover="this.style.color='var(--text-primary)';this.style.borderColor='var(--border)'" onmouseout="this.style.color='var(--text-muted)';this.style.borderColor='var(--border-subtle)'">Logout</button>
        </div>
        {% endif %}
    </div>
</header>

<!-- TOAST CONTAINER (persists across navigation) -->
<div class="toast-container" id="toasts"></div>

<!-- PAGE CONTENT (swapped on navigation) -->
<div id="page-content">
{% block body %}{% endblock %}
</div>

<!-- Shared Utilities -->
<script src="/static/js/utils.js"></script>

<!-- Page Script (swapped on navigation) -->
<div id="page-script">
{% block scripts %}{% endblock %}
</div>

<!-- Client-Side Router -->
<script src="/static/js/router.js"></script>

</body>
</html>
